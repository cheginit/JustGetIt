name: Build DMG

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # create releases and upload the DMG

jobs:
  build:
    runs-on: macos-26   # ships with Xcode 26 (macOS 26 SDK, Liquid Glass icons)
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install xcodegen create-dmg

      - name: Build DMG
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            export VERSION="${GITHUB_REF_NAME#v}"
            export BUILD_NUMBER="$GITHUB_RUN_NUMBER"
          fi
          ./make-dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: JustGetIt
          path: JustGetIt.dmg

      - name: Build release notes from changelog
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" {flag=1; next}
            flag && (/^## / || /^\[[^]]+\]: /) {flag=0}
            flag {print}
          ' CHANGELOG.md > notes.md
          grep -q "[^[:space:]]" notes.md || echo "Release ${GITHUB_REF_NAME}." > notes.md
          echo "----- release notes -----"; cat notes.md

      - name: Release DMG on version tags
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: JustGetIt.dmg
          body_path: notes.md
