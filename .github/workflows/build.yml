name: Build DMG

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # create releases and upload the DMG

jobs:
  build:
    runs-on: macos-26   # ships with Xcode 26 (macOS 26 SDK, Liquid Glass icons)
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install xcodegen create-dmg

      - name: Build DMG
        run: ./make-dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: JustGetIt
          path: JustGetIt.dmg

      - name: Release DMG on version tags
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: JustGetIt.dmg
          generate_release_notes: true
          prerelease: ${{ startsWith(github.ref_name, 'v0.') }}
